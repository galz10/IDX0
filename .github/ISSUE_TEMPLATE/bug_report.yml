name: Bug report
description: Report broken behavior, regressions, crashes, or reliability issues.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for broken behavior, regressions, crashes, or reliability problems in IDX0.
        Search existing issues first and keep the report focused on one problem.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included enough detail to reproduce or investigate the problem.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of IDX0 is affected?
      options:
        - Session management (create/focus/restore)
        - Niri workspace canvas (tiles/layout/navigation)
        - Terminal runtime (Ghostty integration)
        - Embedded browser
        - Workflow rail (checkpoints/handoffs/reviews/approvals)
        - CLI / IPC commands
        - Build, release, or DMG installer
        - Docs
        - Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic repro.
      placeholder: |
        1. Open IDX0
        2. Create or select session "..."
        3. Trigger action "..."
        4. Observe failure "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The selected IDX0 session should keep running and update normally.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The tile freezes, the session status is stuck, and the action does not complete.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How bad is this in practice?
      options:
        - Blocks work completely
        - Major degradation or frequent failure
        - Minor bug or occasional failure
        - Cosmetic issue
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, commit SHA, or branch name if known.
      placeholder: main @ abc1234

  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, IDX0 version/build, shell, CLI tool/provider if relevant.
      placeholder: macOS 15.3, IDX0 v0.0.1, zsh, codex CLI ...

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste the most relevant output only. Redact secrets.
      render: shell

  - type: upload
    id: attachments
    attributes:
      label: Screenshots, recordings, or supporting files
      description: Upload screenshots, short recordings, repro archives, or log files. Redact secrets before uploading.
    validations:
      required: false
      accept: ".png,.jpg,.jpeg,.gif,.webp,.svg,.mp4,.mov,.webm,.log,.txt,.json,.zip"

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: If you found a temporary workaround, include it.
      placeholder: Relaunching the session in IDX0 clears the issue temporarily.
